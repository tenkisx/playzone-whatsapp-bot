# Play Zone — Assistente WhatsApp
# Uso: preenche o .env (ver .env.example) e corre:  docker compose up -d --build
services:
  bot:
    build: .
    image: playzone-whatsapp-bot:latest
    container_name: playzone-whatsapp-bot
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
